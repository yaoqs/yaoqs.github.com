				<a
					href="javascript:void(s=prompt('Enter website address or search terms:','https://yaoqs.github.io'));t=prompt('Number of minutes:','15');location.href=document.location.href+'/'+((s!=null)?s:'');">New
					Timer</a>

			<div id="clock" style="float:right;font-weight:bold;margin-right:20px;"></div>
			<script type="text/javascript">
				var secondsleft, m, h, pretty;
				var inter;
				var clocktype;
				function pause() {
					var p = document.getElementById("pause");
					if (p.innerHTML == "Pause") {
						clearInterval(inter);
						p.innerHTML = "Continue";
					} else {
						inter = setInterval("update()", 1000);
						p.innerHTML = "Pause";
					}
				}
				function addminute() {
					secondsleft += 60;
					updatedisplay();
				}
				function subminute() {
					secondsleft -= Math.min(60, secondsleft);
					updatedisplay();
				}
				function startTimer(mins, type) {
					clocktype = type; // 0 for countdown, 1 for stopwatch
					secondsleft = mins * 60;
					clearInterval(inter);
					updatedisplay();
					inter = setInterval("update()", 1000);
				}
				function updatedisplay() {
					document.getElementById("clock").innerHTML = prettyTime(secondsleft);
					document.title = prettyTime(secondsleft);

				}
				function update() {
					if (clocktype == 0) {
						if (secondsleft > 0) { secondsleft -= 1 } else { onTimeout() };
					} else {
						secondsleft += 1;
					}
					updatedisplay();
				}
				function prettyTime(s) {
					Number(s);
					m = Math.floor(s / 60);
					if (m >= 60) {
						h = Math.floor(m / 60);
						pretty = pre_z(h) + ":" + pre_z(m % 60) + ":" + pre_z(s % 60);
					} else {
						pretty = m + ":" + pre_z(s % 60);
					}
					//	Number(pretty);	
					return pretty;
				}
				function pre_z(x) {
					return (x < 10) ? "0" + x : x;
				}
				function onTimeout() {
					pause();
					alert("Time's up!");
					opener = null;
					window.close();
				}

			</script>

	<style type="text/css">
		/****************************** 回到顶部功能样式 *********************************************/
		#rocket-to-top div {
			left: 0;
			margin: 0;
			overflow: hidden;
			padding: 0;
			position: absolute;
			top: 0;
			width: 149px;
		}

		#rocket-to-top .level-2 {
			background: url("o_rocket_button_up.png") no-repeat scroll -149px 0 transparent;
			display: none;
			height: 250px;
			opacity: 0;
			z-index: 1;
		}

		#rocket-to-top .level-3 {
			background: none repeat scroll 0 0 transparent;
			cursor: pointer;
			display: block;
			height: 150px;
			z-index: 2;
		}

		#rocket-to-top {
			background: url("o_rocket_button_up.png") no-repeat scroll 0 0 transparent;
			cursor: default;
			display: block;
			height: 250px;
			margin: -125px 0 0;
			overflow: hidden;
			padding: 0;
			position: fixed;
			right: 0;
			top: 80%;
			width: 149px;
			z-index: 11;
		}
	</style>
	<script type="text/javascript">

		// jQuery火箭图标返回顶部代码

		$(function () {
			var e = $("#rocket-to-top"),
				t = $(document).scrollTop(),
				n,
				r,
				i = !0;
			$(window).scroll(function () {
				var t = $(document).scrollTop();
				t == 0 ? e.css("background-position") == "0px 0px" ? e.fadeOut("slow") : i && (i = !1, $(".level-2").css("opacity", 1), e.delay(100).animate({
					marginTop: "-1000px"
				},
					"normal",
					function () {
						e.css({
							"margin-top": "-125px",
							display: "none"
						}),
							i = !0
					})) : e.fadeIn("slow")
			}),
				e.hover(function () {
					$(".level-2").stop(!0).animate({
						opacity: 1
					})
				},
					function () {
						$(".level-2").stop(!0).animate({
							opacity: 0
						})
					}),
				$(".level-3").click(function () {
					function t() {
						var t = e.css("background-position");
						if (e.css("display") == "none" || i == 0) {
							clearInterval(n),
								e.css("background-position", "0px 0px");
							return
						}
						switch (t) {
							case "0px 0px":
								e.css("background-position", "-298px 0px");
								break;
							case "-298px 0px":
								e.css("background-position", "-447px 0px");
								break;
							case "-447px 0px":
								e.css("background-position", "-596px 0px");
								break;
							case "-596px 0px":
								e.css("background-position", "-745px 0px");
								break;
							case "-745px 0px":
								e.css("background-position", "-298px 0px");
						}
					}
					if (!i) return;
					n = setInterval(t, 50),
						$("html,body").animate({ scrollTop: 0 }, "slow");
				});
		});

	</script>
