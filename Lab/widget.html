                <div class="bg">
                        Hex Clock 是一个简单的网站，它使用十六进制的颜色代码 #000000 ～ #235959 来表示一天 24 小时，并且会在背景展示当前颜色代码的具体颜色
                        </div>
                <p id="hex">#861001</p>
                <div id="Timesphere"></div>

                <script>
                        $(d3.timer(()=>
                        {
                        var d = new Date()
                        var h = d.getHours();
                        var m = d.getMinutes();
                        var s = d.getSeconds();
                        if (h<=9) {h = '0'+h};
                        if (m<=9) {m = '0'+m};
                        if (s<=9) {s = '0'+s};

                        $("div#Timesphere").css("width","100px").height("100px").css("border-radius","50%").css("background","radial-gradient(circle at 70px 70px,"+'#'+(h*10).toString(16)+(m*4).toString(16)+(s*4).toString(16)+",#000000)").css("position","float");
                        $("p#hex").text('#'+h+m+s);
                        }),1000);

                        </script>
